name: Bump version

# Keeps js/version.js in sync with main's commit count, so the number shown on the start
# screen ticks up by exactly one on every merge to main. Ignores pushes that only touch
# js/version.js so the bump commit this workflow makes doesn't trigger itself again.
on:
  push:
    branches: [main]
    paths-ignore:
      - js/version.js

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write version file
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "// Auto-generated by .github/workflows/bump-version.yml on every push to main - the number is" > js/version.js
          echo "// main's total commit count, so it ticks up exactly once per merge. Don't hand-edit; changes" >> js/version.js
          echo "// here get overwritten by the next merge anyway." >> js/version.js
          echo "export const VERSION = \"v${COUNT}\";" >> js/version.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/version.js
          git diff --staged --quiet || git commit -m "Bump version to v$(git rev-list --count HEAD)"
          git push
